<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Screen Frame Processing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a1a;
            color: white;
            min-height: 100vh;
        }

        .container {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #4ECDC4;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input, button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
        }

        input {
            background: #333;
            color: white;
            min-width: 300px;
        }

        input:focus {
            outline: none;
            background: #444;
        }

        button {
            background: #4ECDC4;
            color: #1a1a1a;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover:not(:disabled) {
            background: #45b7aa;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #666;
            color: #999;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 8px;
            background: #333;
        }

        .status.connected {
            background: #2d5a2d;
            color: #90EE90;
        }

        .status.error {
            background: #5a2d2d;
            color: #FF6B6B;
        }

        .video-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .video-box {
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            min-height: 400px;
        }

        .video-box h3 {
            position: absolute;
            top: 10px;
            left: 15px;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
        }

        .video-box.original h3 {
            color: #4ECDC4;
        }

        .video-box.processed h3 {
            color: #FF6B6B;
        }

        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #processedCanvas {
            background: #222;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: #333;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4ECDC4;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #ccc;
            margin-top: 5px;
        }

        .placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .video-container {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            input {
                min-width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Live Screen Frame Processing</h1>
            
        </div>

        <div class="controls">
            <!-- <input type="text" id="apiUrl" placeholder="FastAPI URL (e.g., http://localhost:8000)" value="http://localhost:8000"> -->
            <button onclick="startProcessing()" id="startBtn">Start Processing</button>
            <button onclick="stopProcessing()" id="stopBtn" disabled>Stop Processing</button>
        </div>

        <div class="status" id="status">
            Ready to start processing
        </div>

        <div class="video-container">
            <div class="video-box original">
                <h3>Original Screen</h3>
                <video id="screenVideo" autoplay muted></video>
                <div class="placeholder" id="originalPlaceholder">
                    Click "Start Processing" to begin
                </div>
            </div>
            
            <div class="video-box processed">
                <h3>Processed Output</h3>
                <canvas id="processedCanvas"></canvas>
                <div class="placeholder" id="processedPlaceholder">
                    Processed frames will appear here
                </div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-value" id="fpsCounter">0</div>
                <div class="stat-label">FPS</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="frameCounter">0</div>
                <div class="stat-label">Frames Processed</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="latencyCounter">0ms</div>
                <div class="stat-label">Processing Latency</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="errorCounter">0</div>
                <div class="stat-label">Errors</div>
            </div>
        </div>
    </div>

    <script>
        let mediaStream = null;
        let isProcessing = false;
        let apiBaseUrl = '';
        let processInterval = null;
        
        // Stats
        let frameCount = 0;
        let errorCount = 0;
        let lastFrameTime = Date.now();
        let fpsArray = [];

        // Canvas and video elements
        const video = document.getElementById('screenVideo');
        const canvas = document.getElementById('processedCanvas');
        const ctx = canvas.getContext('2d');

        async function startProcessing() {
            const url = "http://localhost:8000"; //document.getElementById('apiUrl').value.trim();
            if (!url) {
                updateStatus('Please enter a valid API URL', 'error');
                return;
            }

            apiBaseUrl = url.endsWith('/') ? url.slice(0, -1) : url;

            try {
                // Start screen capture
                mediaStream = await navigator.mediaDevices.getDisplayMedia({
                    video: {
                        mediaSource: 'screen',
                        frameRate: 30,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });

                video.srcObject = mediaStream;
                document.getElementById('originalPlaceholder').style.display = 'none';
                document.getElementById('processedPlaceholder').style.display = 'none';

                // Wait for video to be ready
                video.addEventListener('loadedmetadata', () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    isProcessing = true;
                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('stopBtn').disabled = false;
                    
                    updateStatus('Processing frames...', 'connected');
                    
                    // Start frame processing
                    processFrames();
                });

                // Handle stream end
                mediaStream.getVideoTracks()[0].addEventListener('ended', () => {
                    stopProcessing();
                });

            } catch (error) {
                updateStatus('Failed to start screen capture: ' + error.message, 'error');
                console.error('Screen capture error:', error);
            }
        }

        function stopProcessing() {
            isProcessing = false;
            
            if (processInterval) {
                clearInterval(processInterval);
                processInterval = null;
            }

            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }

            video.srcObject = null;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            document.getElementById('originalPlaceholder').style.display = 'flex';
            document.getElementById('processedPlaceholder').style.display = 'flex';
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            
            updateStatus('Processing stopped', '');
            resetStats();
        }

        function processFrames() {
            if (!isProcessing) return;

            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;

            const processFrame = async () => {
                if (!isProcessing || video.readyState !== 4) return;

                const startTime = Date.now();

                try {
                    // Draw current video frame to temp canvas
                    tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
                    
                    // Convert to blob
                    tempCanvas.toBlob(async (blob) => {
                        if (!blob || !isProcessing) return;

                        try {
                            // Send frame to FastAPI
                            const response = await fetch(`${apiBaseUrl}/process_frame`, {
                                method: 'POST',
                                body: blob,
                                headers: {
                                    'Content-Type': 'application/octet-stream',
                                }
                            });

                            if (response.ok) {
                                const processedBlob = await response.blob();
                                
                                // Create image from processed blob
                                const img = new Image();
                                img.onload = () => {
                                    // Draw processed frame to display canvas
                                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                    
                                    // Update stats
                                    const endTime = Date.now();
                                    const latency = endTime - startTime;
                                    updateStats(latency);
                                    
                                    URL.revokeObjectURL(img.src);
                                };
                                img.src = URL.createObjectURL(processedBlob);
                            } else {
                                throw new Error(`HTTP ${response.status}`);
                            }
                        } catch (error) {
                            console.error('Frame processing error:', error);
                            errorCount++;
                            updateErrorCount();
                        }
                    }, 'image/jpeg', 0.8);

                } catch (error) {
                    console.error('Frame capture error:', error);
                    errorCount++;
                    updateErrorCount();
                }
            };

            // Process frames at 15 FPS to balance performance and smoothness
            processInterval = setInterval(processFrame, 2000); // ~15 FPS
        }

        function updateStats(latency) {
            frameCount++;
            
            // Calculate FPS
            const now = Date.now();
            const timeDiff = now - lastFrameTime;
            if (timeDiff > 0) {
                const currentFps = 1000 / timeDiff;
                fpsArray.push(currentFps);
                if (fpsArray.length > 10) {
                    fpsArray.shift();
                }
                const avgFps = fpsArray.reduce((a, b) => a + b, 0) / fpsArray.length;
                document.getElementById('fpsCounter').textContent = avgFps.toFixed(1);
            }
            lastFrameTime = now;
            
            // Update other stats
            document.getElementById('frameCounter').textContent = frameCount;
            document.getElementById('latencyCounter').textContent = latency + 'ms';
        }

        function updateErrorCount() {
            document.getElementById('errorCounter').textContent = errorCount;
        }

        function resetStats() {
            frameCount = 0;
            errorCount = 0;
            fpsArray = [];
            lastFrameTime = Date.now();
            
            document.getElementById('fpsCounter').textContent = '0';
            document.getElementById('frameCounter').textContent = '0';
            document.getElementById('latencyCounter').textContent = '0ms';
            document.getElementById('errorCounter').textContent = '0';
        }

        function updateStatus(message, type = '') {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        // Handle page unload
        window.addEventListener('beforeunload', () => {
            stopProcessing();
        });
    </script>
</body>
</html>
